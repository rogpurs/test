<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ページが見つかりません | SKy Navia</title>
  <link rel="stylesheet" href="/test/assets/css/style.css">
</head>
<body>
  <div id="header-placeholder"></div>
  <main>
    <div class="error-page">
      <div class="container" style="text-align:center;">
        <p class="error-num">404</p>
        <h1 class="error-title heading-ja">ページが見つかりません</h1>
        <p class="error-desc">お探しのページは移動・削除されたか、URLが間違っている可能性があります。</p>
        <div class="error-actions">
          <a href="/test/" class="btn btn--primary btn--lg">トップページへ</a>
          <a href="/test/search.html" class="btn btn--outline btn--lg">在庫を検索する</a>
        </div>
        <div class="error-search">
          <p style="font-size:0.875rem;color:var(--text-light);margin-bottom:16px;margin-top:48px;">お探しの部品を検索する</p>
          <form class="search-form">
            <div class="search-box">
              <input class="search-box__input" type="text" name="q" placeholder="品番・型番・メーカー名…">
              <button type="submit" class="search-box__btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                検索
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script src="/test/assets/js/main.js"></script>
</body>
</html>
